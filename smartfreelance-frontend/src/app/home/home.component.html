<section class="hero-section py-5 bg-gradient text-white text-center shadow-sm mb-5" style="background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);">
  <div class="container py-5">
    <h1 class="display-3 fw-bold mb-3">Find the perfect Freelancer</h1>
    <p class="lead mb-4 opacity-75">Connect with world-class talent and bring your projects to life.</p>
    <div class="d-flex justify-content-center gap-3">
      <button class="btn btn-light btn-lg rounded-pill px-5 shadow-sm fw-bold">Get Started</button>
      <button class="btn btn-outline-light btn-lg rounded-pill px-5 fw-bold" routerLink="/freelancers">Browse Talents</button>
    </div>
  </div>
</section>

<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <div>
      <h2 class="fw-bold mb-0">Top Freelancers</h2>
      <p class="text-muted">Highly rated experts in various fields</p>
    </div>
    <button class="btn btn-link text-primary fw-bold text-decoration-none" routerLink="/freelancers">
      View all <i class="fas fa-arrow-right ms-1"></i>
    </button>
  </div>

  <div class="row g-4">
    <div class="col-md-4 col-sm-6" *ngFor="let freelancer of freelancers">
      <div class="card h-100 border-0 shadow-sm hover-elevate transition-all home-card">
        <div class="card-body p-4 text-center">
          <div class="avatar-container mb-4 mx-auto">
            <div class="avatar bg-light rounded-circle d-flex align-items-center justify-content-center mx-auto shadow-sm avatar-bg" style="width: 90px; height: 90px;">
              <i class="fas fa-user fa-3x text-secondary"></i>
            </div>
          </div>
          <h5 class="fw-bold mb-1 card-title">{{freelancer.name}}</h5>
          <p class="text-primary small fw-bold mb-3">{{freelancer.skill}}</p>
          
          <div class="d-flex justify-content-center align-items-center mb-4">
            <div class="text-success fw-bold fs-4">${{freelancer.price}} <small class="text-muted fw-normal fs-6 card-subtitle">/h</small></div>
          </div>
          
          <button class="btn btn-primary w-100 rounded-pill py-2 shadow-sm fw-bold">
            Hire Talent
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
.hover-elevate:hover {
  transform: translateY(-10px);
  box-shadow: 0 1rem 3rem rgba(0,0,0,0.175) !important;
}
.transition-all {
  transition: all 0.3s ease-in-out;
}

/* Dark mode compatibility for home cards */
body.dark-mode .home-card {
  background-color: #1e293b;
  color: #f8fafc;
}
body.dark-mode .card-title {
  color: #f8fafc;
}
body.dark-mode .card-subtitle {
  color: #94a3b8 !important;
}
body.dark-mode .avatar-bg {
  background-color: #0f172a !important;
}
body.dark-mode .text-muted {
  color: #94a3b8 !important;
}
</style>
