<div class="add-form-wrap">
  <form [formGroup]="form" (ngSubmit)="add()">
    <div class="add-form-body">
      <div class="form-group">

        <label for="projectId" class="form-label">ID Projet</label>
        <input type="number" min="1" class="form-input" id="projectId" formControlName="projectId" placeholder="Ex. 1" [readonly]="projectLocked">

        <label for="projectId" class="form-label">Project</label>
        <select class="form-input form-select" id="projectId" formControlName="projectId">
          <option [ngValue]="null" disabled>Select a project</option>
          <option *ngFor="let p of projects" [ngValue]="p.id">{{ p.title }} (ID: {{ p.id }})</option>
        </select>
        <small *ngIf="projects.length === 0 && !errorhandling" class="form-hint">Loading projects from project-service…</small>

      </div>
      <div class="form-group" *ngIf="!isFreelancer">
        <label for="freelancerId" class="form-label">ID Freelancer</label>
        <input type="number" min="1" class="form-input" id="freelancerId" formControlName="freelancerId" placeholder="Ex. 1">
      </div>
      <div class="form-group">
        <label for="coverLetter" class="form-label">Cover letter</label>
        <textarea class="form-input form-textarea" id="coverLetter" formControlName="coverLetter" rows="4" placeholder="Describe your experience and motivation..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="proposedPrice" class="form-label">Proposed price</label>
          <input type="number" step="0.01" min="0" class="form-input" id="proposedPrice" formControlName="proposedPrice" placeholder="0.00">
        </div>
        <div class="form-group">
          <label for="estimatedDeliveryDays" class="form-label">Estimated days</label>
          <input type="number" min="1" class="form-input" id="estimatedDeliveryDays" formControlName="estimatedDeliveryDays" placeholder="Ex. 10">
        </div>
      </div>

      <div class="form-group" *ngIf="!isFreelancer">
        <label for="status" class="form-label">Statut</label>

        <select class="form-input form-select" id="status" formControlName="status">
          <option value="PENDING">Pending</option>
          <option value="ACCEPTED">Accepted</option>
          <option value="REJECTED">Rejected</option>
        </select>
      </div>
      <p *ngIf="errorhandling" class="form-error">{{ errorhandling }}</p>
    </div>
    <div class="add-form-actions">

      <button type="button" class="btn btn-secondary" (click)="close()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">Add application</button>

    </div>
  </form>
</div>
