<div class="delete-dialog">
  <header class="delete-dialog__header">
    <h2 class="delete-dialog__title">Delete contract</h2>
    <button type="button" class="delete-dialog__close" (click)="close()" aria-label="Close">&times;</button>
  </header>
  <div class="delete-dialog__body">
    <p class="delete-dialog__message">Are you sure you want to delete this contract? This action cannot be undone.</p>
  </div>
  <footer class="delete-dialog__footer">
    <button type="button" class="delete-dialog__btn delete-dialog__btn--secondary" (click)="close()">Close</button>
    <button type="button" class="delete-dialog__btn delete-dialog__btn--danger" (click)="deleteItem()">Delete</button>
  </footer>
</div>
