<!-- Loading -->
<div class="loading-container" *ngIf="loading">
  <div class="spinner"></div>
  <p>Loading...</p>
</div>

<!-- Error -->
<div class="form-error-banner" *ngIf="error">
  <span>⚠️</span> {{ error }}
</div>

<!-- Form Card -->
<div class="form-container" *ngIf="!loading">
  <div class="form-card">

    <div class="form-card-header">
      <div class="form-title-wrapper">
        <span class="form-badge">{{ isEditMode ? 'Edit' : 'New' }}</span>
        <h2 class="form-title">{{ isEditMode ? 'Edit Course' : 'Add a Course' }}</h2>
      </div>
    </div>

    <div class="form-card-body">
      <form (ngSubmit)="onSubmit()" #courseForm="ngForm">

        <!-- Formation ID readonly -->
        <div class="field-group" *ngIf="formationId">
          <label class="field-label">
            <span class="field-icon">📚</span> Linked Formation
          </label>
          <input
            type="text"
            class="field-input"
            [value]="'Formation #' + formationId"
            readonly
            disabled
          />
        </div>

        <!-- Title -->
        <div class="field-group">
          <label for="title" class="field-label">
            <span class="field-icon">📝</span> Title <span class="required">*</span>
          </label>
          <input
            type="text"
            class="field-input"
            id="title"
            name="title"
            placeholder="Enter the course title..."
            [(ngModel)]="course.title"
            required
            #title="ngModel"
            [class.input-error]="title.invalid && title.touched"
          />
          <div class="field-error" *ngIf="title.invalid && title.touched">
            ⚠ Title is required.
          </div>
        </div>

        <!-- Content -->
        <div class="field-group">
          <label for="content" class="field-label">
            <span class="field-icon">📄</span> Content
          </label>
          <textarea
            class="field-input field-textarea"
            id="content"
            name="content"
            rows="5"
            placeholder="Describe the course content..."
            [(ngModel)]="course.content"
          ></textarea>
        </div>

        <!-- Video URL -->
        <div class="field-group">
          <label for="videoUrl" class="field-label">
            <span class="field-icon">🎬</span> Video URL
          </label>
          <div class="input-prefix-wrapper">
            <span class="input-prefix">🔗</span>
            <input
              type="url"
              class="field-input with-prefix"
              id="videoUrl"
              name="videoUrl"
              placeholder="https://..."
              [(ngModel)]="course.videoUrl"
            />
          </div>
        </div>

        <!-- Hidden formation -->
        <input type="hidden" name="formation" [ngModel]="formationId" />

        <!-- Actions -->
        <div class="form-actions">
          <button type="button" class="btn btn-cancel" (click)="cancel()">← Cancel</button>
          <button type="submit" class="btn btn-submit" [disabled]="courseForm.invalid">
            {{ isEditMode ? '✏️ Update' : '✚ Create Course' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
