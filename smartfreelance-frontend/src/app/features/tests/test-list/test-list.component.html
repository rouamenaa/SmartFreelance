<!-- Loading -->
<div class="loading-container" *ngIf="loading">
  <div class="spinner"></div>
  <p>Loading...</p>
</div>

<!-- Error -->
<div class="detail-error-banner" *ngIf="error">
  <span>⚠️</span> {{ error }}
</div>

<!-- Content -->
<div class="list-container" *ngIf="!loading">

  <!-- Header -->
  <div class="list-header">
    <div class="list-title-wrapper">
      <span class="list-badge">Tests</span>
      <h2 class="list-title">Tests — Formation #{{ formationId }}</h2>
      <span class="total-count" *ngIf="tests.length > 0">
        {{ tests.length }} test{{ tests.length > 1 ? 's' : '' }}
      </span>
    </div>
    <div class="list-actions">
      <button class="btn btn-back" (click)="goBack()">← Back</button>
      <button class="btn btn-add" (click)="addTest()">✚ Add a Test</button>
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="tests.length === 0">
    <div class="empty-icon">📭</div>
    <h4>No tests available</h4>
    <p>No tests have been created yet for this formation.</p>
    <button class="btn btn-add" (click)="addTest()">✚ Create the first test</button>
  </div>

  <!-- Cards Grid -->
  <div class="cards-grid" *ngIf="tests.length > 0">
    <div class="test-card" *ngFor="let t of tests">
      <div class="card-accent"></div>
      <div class="card-body">

        <div class="card-top">
          <div class="card-icon-wrapper">
            <span class="card-icon">📝</span>
          </div>
          <div class="card-title-wrapper">
            <h5 class="card-title">{{ t.title }}</h5>
            <span class="score-badge">⭐ {{ t.totalScore }} pts</span>
          </div>
        </div>

        <div class="card-meta" *ngIf="t.formation?.id">
          <span class="meta-chip">📚 Formation #{{ t.formation?.id }}</span>
        </div>

        <div class="card-footer-row">
          <button class="btn btn-view" (click)="viewTest(t.id!)">
            👁 View
          </button>
          <button class="btn btn-edit" (click)="editTest(t.id!)">
            ✏️ Edit
          </button>
          <button class="btn btn-delete" (click)="deleteTest(t.id!)">
            🗑️ Delete
          </button>
        </div>

      </div>
    </div>
  </div>

</div>
