<!-- Loading -->
<div class="loading-container" *ngIf="loading">
  <div class="spinner"></div>
  <p>Loading...</p>
</div>

<!-- Error -->
<div class="detail-error-banner" *ngIf="error">
  <span>⚠️</span> {{ error }}
</div>

<!-- Content -->
<div class="list-container" *ngIf="!loading">

  <!-- Header -->
  <div class="list-header">
    <div class="list-title-wrapper">
      <span class="list-badge">Rewards</span>
      <h2 class="list-title">Rewards — Formation #{{ formationId }}</h2>
      <span class="total-count" *ngIf="rewards.length > 0">
        {{ rewards.length }} reward{{ rewards.length > 1 ? 's' : '' }}
      </span>
    </div>
    <div class="list-actions">
      <button class="btn btn-back" (click)="goBack()">← Back</button>
      <button class="btn btn-add" (click)="addReward()">✚ Add a Reward</button>
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="rewards.length === 0">
    <div class="empty-icon">📭</div>
    <h4>No rewards available</h4>
    <p>No rewards have been created yet for this formation.</p>
    <button class="btn btn-add" (click)="addReward()">✚ Create a Reward</button>
  </div>

  <!-- Cards Grid -->
  <div class="cards-grid" *ngIf="rewards.length > 0">
    <div class="reward-card" *ngFor="let r of rewards">
      <div class="card-accent"></div>
      <div class="card-body">

        <div class="card-top">
          <div class="card-icon">🏆</div>
          <div class="card-title-wrapper">
            <h5 class="card-title">{{ r.name }}</h5>
            <span class="type-badge">{{ r.type }}</span>
          </div>
        </div>

        <!-- ✅ formation?.id au lieu de formationId -->
        <div class="card-meta" *ngIf="r.formation?.id">
          <span class="meta-chip">📚 Formation #{{ r.formation?.id }}</span>
        </div>

        <div class="card-footer-row">
          <button class="btn btn-view" (click)="viewReward(r.id!)">👁 View</button>
          <button class="btn btn-edit" (click)="editReward(r.id!)">✏️ Edit</button>
          <button class="btn btn-delete" (click)="deleteReward(r.id!)">🗑️ Delete</button>
        </div>

      </div>
    </div>
  </div>

</div>
