<!-- Loading -->
<div class="loading-container" *ngIf="loading">
  <div class="spinner"></div>
  <p>Loading...</p>
</div>

<!-- Error -->
<div class="form-error-banner" *ngIf="error">
  <span>⚠️</span> {{ error }}
</div>

<!-- Form Card -->
<div class="form-container" *ngIf="!loading">
  <div class="form-card">

    <!-- Header -->
    <div class="form-card-header">
      <div class="form-title-wrapper">
        <span class="form-badge">{{ isEditMode ? 'Edit' : 'New' }}</span>
        <h2 class="form-title">
          {{ isEditMode ? 'Edit training' : 'Add a training' }}
        </h2>
      </div>
    </div>

    <!-- Body -->
    <div class="form-card-body">
      <form (ngSubmit)="onSubmit()" #formationForm="ngForm">

        <!-- Title -->
        <div class="field-group">
          <label for="title" class="field-label">
            <span class="field-icon">📝</span> Title <span class="required">*</span>
          </label>
          <input
            type="text"
            class="field-input"
            id="title"
            name="title"
            placeholder="Enter the training title..."
            [(ngModel)]="formation.title"
            required
            #title="ngModel"
            [class.input-error]="title.invalid && title.touched"
          />
          <div class="field-error" *ngIf="title.invalid && title.touched">
            ⚠ Title is required.
          </div>
        </div>

        <!-- Description -->
        <div class="field-group">
          <label for="description" class="field-label">
            <span class="field-icon">📄</span> Description
          </label>
          <textarea
            class="field-input field-textarea"
            id="description"
            name="description"
            rows="4"
            placeholder="Describe the content and objectives of the training..."
            [(ngModel)]="formation.description"
          ></textarea>
        </div>

        <!-- Duration + Level (side by side) -->
        <div class="field-row">

          <!-- Duration -->
          <div class="field-group">
            <label for="duration" class="field-label">
              <span class="field-icon">⏱️</span> Duration (hours) <span class="required">*</span>
            </label>
            <div class="input-prefix-wrapper">
              <span class="input-prefix">h</span>
              <input
                type="number"
                class="field-input with-prefix"
                id="duration"
                name="duration"
                placeholder="e.g., 10"
                [(ngModel)]="formation.duration"
                required
                min="1"
                #duration="ngModel"
                [class.input-error]="duration.invalid && duration.touched"
              />
            </div>
            <div class="field-error" *ngIf="duration.invalid && duration.touched">
              ⚠ Duration is required (min. 1 hour).
            </div>
          </div>

          <!-- Level -->
          <div class="field-group">
            <label for="level" class="field-label">
              <span class="field-icon">🎯</span> Level <span class="required">*</span>
            </label>
            <div class="select-wrapper">
              <select
                class="field-input field-select"
                id="level"
                name="level"
                [(ngModel)]="formation.level"
                required
                #level="ngModel"
                [class.input-error]="level.invalid && level.touched"
              >
                <option value="" disabled>Select a level</option>
                <option *ngFor="let lvl of levels" [value]="lvl">{{ lvl }}</option>
              </select>
              <span class="select-arrow">▾</span>
            </div>
            <div class="field-error" *ngIf="level.invalid && level.touched">
              ⚠ Level is required.
            </div>
          </div>

        </div>

        <!-- Actions -->
        <div class="form-actions">
          <button type="button" class="btn btn-cancel" (click)="cancel()">
            ← Cancel
          </button>
          <button type="submit" class="btn btn-submit" [disabled]="formationForm.invalid">
            {{ isEditMode ? '✏️ Edit' : '✚ Create training' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
