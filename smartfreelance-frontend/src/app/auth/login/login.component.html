<div class="login-container">
  <h2>Login</h2>

  <form #loginForm="ngForm" (ngSubmit)="login()">
    
    <div class="form-group">
      <label>Email</label>
      <input 
        type="email"
        [(ngModel)]="email"
        name="email"
        #emailCtrl="ngModel"
        required
        email
        class="form-control">

      <!-- Messages d'erreur -->
      <div *ngIf="emailCtrl.invalid && emailCtrl.touched" class="text-danger">
        <small *ngIf="emailCtrl.errors?.['required']">
          Email obligatoire
        </small>
        <small *ngIf="emailCtrl.errors?.['email']">
          Format email invalide
        </small>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input 
        type="password"
        [(ngModel)]="password"
        name="password"
        required
        class="form-control">
    </div>

    <button 
      type="submit"
      class="btn btn-primary w-100"
      [disabled]="loginForm.invalid">
      Login
    </button>

    <p class="error text-danger" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>

  </form>
</div>
