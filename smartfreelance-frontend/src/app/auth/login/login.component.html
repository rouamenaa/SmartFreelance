<div class="login-page">

  <div class="login-card">

    <!-- Logo / Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <span class="brand-name">SmartFreelance</span>
    </div>

    <div class="login-header">
      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Sign in to your account</p>
    </div>

    <form #loginForm="ngForm" (ngSubmit)="login()">

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email address</label>
        <div class="input-wrapper" [class.input-wrapper--error]="emailCtrl.invalid && emailCtrl.touched">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            #emailCtrl="ngModel"
            required
            email
            placeholder="you@example.com"
            class="form-input">
        </div>
        <div *ngIf="emailCtrl.invalid && emailCtrl.touched" class="form-error">
          <span *ngIf="emailCtrl.errors?.['required']">Email is required</span>
          <span *ngIf="emailCtrl.errors?.['email']">Invalid email format</span>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <div class="label-row">
          <label class="form-label">Password</label>
        </div>
        <div class="input-wrapper">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            required
            placeholder="••••••••"
            class="form-input">
        </div>
      </div>

      <!-- Error -->
      <div *ngIf="errorMessage" class="error-banner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errorMessage }}
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-login" [disabled]="loginForm.invalid">
        Sign in
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>

      <!-- Register link -->
      <p class="register-link">
        Don't have an account ?
        <a routerLink="/utilisateur">Create one</a>
      </p>

    </form>
  </div>
