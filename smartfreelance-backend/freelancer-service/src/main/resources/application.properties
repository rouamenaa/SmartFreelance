# ===============================
# APPLICATION
# ===============================
spring.application.name=freelancer-service
server.port=8083
spring.main.web-application-type=servlet

# ===============================
# DATABASE - MySQL (active)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/pi_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Recommended for MySQL 8+ (removes dialect warning)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Let Hibernate create/update schema automatically (development-friendly)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Show SQL queries (very helpful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ===============================
# JPA & PERFORMANCE
# ===============================
spring.jpa.open-in-view=false

# ===============================
# JSON SERIALIZATION
# ===============================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ===============================
# INTERNATIONALIZATION / MESSAGES
# ===============================
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8

# ===============================
# LOGGING (detailed SQL + binding parameters)
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE   # older name - TRACE on bind is usually enough now

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true