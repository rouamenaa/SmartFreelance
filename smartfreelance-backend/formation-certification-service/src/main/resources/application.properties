# Nom du microservice
spring.application.name=formation-service

# Port du microservice
server.port=8084

# Config MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/pi_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuration Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Heartbeats rapides pour �viter warnings
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10
calendar.api.url=http://localhost:9999/calendar/events
resilience4j.circuitbreaker.instances.calendarApi.slidingWindowSize=5
resilience4j.circuitbreaker.instances.calendarApi.failureRateThreshold=50
resilience4j.circuitbreaker.instances.calendarApi.waitDurationInOpenState=10000