name: Project Service CI

on:
  push:
    branches: [ main ]
    paths:
      - 'smartfreelance-backend/project-service/**'
  pull_request:
    paths:
      - 'smartfreelance-backend/project-service/**'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smartfreelance-backend/project-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: mvn -B clean test -Dspring.profiles.active=test
