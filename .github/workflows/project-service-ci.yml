name: Project Service CI

on:
  push:
    branches: [ main ]
    paths:
      - 'smartfreelance-backend/project-service/**'
  pull_request:
    paths:
      - 'smartfreelance-backend/project-service/**'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    defaults:
      run:
        working-directory: smartfreelance-backend/project-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests + JaCoCo + SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: >
          mvn -B clean verify sonar:sonar
          -Dspring.profiles.active=test
          -Dsonar.host.url=${SONAR_HOST_URL}
          -Dsonar.token=${SONAR_TOKEN}
          -Dsonar.projectKey=${SONAR_PROJECT_KEY}
          -Dsonar.qualitygate.wait=true

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: smartfreelance-backend/project-service/target/site/jacoco/
