name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'smartfreelance-frontend/**'
  pull_request:
    paths:
      - 'smartfreelance-frontend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smartfreelance-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: smartfreelance-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome
        run: sudo apt-get update && sudo apt-get install -y chromium-browser

      - name: Run tests with coverage
        run: npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Debug coverage files
        run: |
          pwd
          ls -la coverage || true
          find coverage -name "lcov.info" -type f || true

      - name: SonarCloud Scan
        if: ${{ vars.SONAR_ORGANIZATION != '' && vars.SONAR_PROJECT_KEY_FRONT != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: smartfreelance-frontend
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY_FRONT }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.javascript.lcov.reportPaths=coverage/**/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
